name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run ${{ matrix.script }}
        env:
          # Pas de certificat de signature Apple (compte développeur payant
          # requis) : on ne peut pas faire de vraie signature Developer ID +
          # notarisation. build/after-pack-icon.js applique une signature
          # ad-hoc (gratuite) au .app — sans ça, macOS affichait "est
          # endommagé" (pas juste "développeur non identifié") et aucun
          # clic droit > Ouvrir ne permettait de le contourner.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: Soft
          files: |
            dist_electron/*.exe
            dist_electron/*.dmg
            dist_electron/*.yml
            dist_electron/*.blockmap
