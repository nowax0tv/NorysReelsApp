name: Build installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: dist
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run ${{ matrix.script }}
        env:
          # Pas de certificat de signature Apple : on construit un .dmg non
          # signé. Les utilisateurs verront un avertissement Gatekeeper
          # ("développeur non identifié") à la première ouverture — clic
          # droit puis "Ouvrir" pour passer outre.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: Soft
          files: |
            dist_electron/*.exe
            dist_electron/*.dmg
